<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="refresh" content="0; url=./main/index.html">
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <title>Redirecting to Mods-Hub...</title>
    <style>
        body {
            background: #0e0e10;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            font-family: 'DM Sans', sans-serif;
            color: #888;
        }
        .loader {
            text-align: center;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(66,133,244,0.2);
            border-top-color: #4285F4;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 16px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="loader">
        <div class="spinner"></div>
        <p>Redirecting to Mods-Hub...</p>
    </div>
</body>
</html>
